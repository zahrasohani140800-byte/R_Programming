name: R Script Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("ggplot2","dplyr","jsonlite"))'

      - name: Run R scripts
        run: |
          Rscript Basics/script1.R
          Rscript Data_Handling/script2.R
