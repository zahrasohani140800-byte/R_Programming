name: Run Dataframe Example

on:
  push:
    branches: [ "main" ]

jobs:
  run-r:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Run dataframe_example file
        run: Rscript dataframe_example.r
