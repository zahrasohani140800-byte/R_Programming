jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install Required Packages
        run: |
          Rscript -e "install.packages(c('jsonlite','ggplot2'), repos='http://cran.rstudio.com/')"

      - name: Run Case Study Script
        run: Rscript CaseStudy/analysis.R
